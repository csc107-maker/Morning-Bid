<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="삼성전자 분기별 영업이익 추이 - 20.1조 → 57.2조 → 89.4조원" />
<meta property="og:description" content="2025년 4분기부터 2026년 2분기까지, 삼성전자 영업이익이 얼마나 가파르게 늘었는지 한눈에 보는 분기별 추이 차트입니다." />
<meta property="og:image" content="https://example.com/samsung-q2-2026-thumbnail.png" />
<meta property="og:url" content="https://blog.naver.com/example/samsung-q2-2026-earnings" />
<title>분기별 실적 추이</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/dist/tabler-icons.min.css">
<style>
  :root{
    --sam-bg:#F6F8FB;
    --sam-surface:#FFFFFF;
    --sam-ink:#10192B;
    --sam-ink-muted:#5B6B85;
    --sam-blue:#155EEF;
    --sam-blue-soft:#EAF1FF;
    --sam-green:#0E9F6E;
    --sam-green-soft:#E7F9F1;
    --sam-line:#E3E8F0;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:20px;background:var(--sam-bg);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;}
  .card{
    position:relative;max-width:720px;margin:0 auto;background:var(--sam-surface);
    border:1px solid var(--sam-line);border-radius:20px;padding:32px 32px 28px;
    box-shadow:0 1px 2px rgba(16,25,43,0.04), 0 12px 32px -16px rgba(16,25,43,0.12);
    clip-path:polygon(0 0, calc(100% - 28px) 0, 100% 28px, 100% 100%, 0 100%);
  }
  .notch{position:absolute;top:0;right:0;width:28px;height:28px;background:var(--sam-green);}
  .eyebrow{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:0.03em;color:var(--sam-green);text-transform:uppercase;}
  .eyebrow i{font-size:16px;}
  .headline{margin:10px 0 2px;font-size:22px;font-weight:800;color:var(--sam-ink);letter-spacing:-0.01em;}
  .sub{margin:0 0 30px;font-size:13.5px;color:var(--sam-ink-muted);}

  .chart{
    display:flex;
    align-items:flex-end;
    gap:0;
    height:260px;
    padding:0 8px;
  }
  .col-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    height:100%;
    position:relative;
  }
  .growth{
    display:flex;
    align-items:center;
    gap:3px;
    color:var(--sam-green);
    background:var(--sam-green-soft);
    border-radius:100px;
    padding:3px 9px;
    margin-bottom:14px;
  }
  .growth i{font-size:14px;}
  .growth span{font-family:'Roboto Mono','JetBrains Mono',monospace;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .value-label{
    font-family:'Roboto Mono','JetBrains Mono',monospace;
    font-size:16px;font-weight:700;color:var(--sam-ink);
    margin-bottom:8px;
  }
  .bar{
    width:64px;
    border-radius:10px 10px 4px 4px;
    background:linear-gradient(180deg,#CBD9F7,#9DB6EE);
  }
  .bar.highlight{background:linear-gradient(180deg,var(--sam-blue),#0E3FBF);}
  .q-label{margin-top:10px;font-size:12.5px;font-weight:600;color:var(--sam-ink-muted);text-align:center;line-height:1.4;}
  .q-label b{display:block;font-size:13.5px;color:var(--sam-ink);}

  .note{
    margin-top:26px;
    background:var(--sam-green-soft);
    border:1px solid #BFE8D6;
    border-radius:14px;
    padding:14px 16px;
    font-size:13.5px;
    color:var(--sam-ink);
    line-height:1.6;
    display:flex;
    gap:10px;
  }
  .note i{color:var(--sam-green);font-size:20px;flex-shrink:0;margin-top:1px;}
  .note b{font-family:'Roboto Mono','JetBrains Mono',monospace;color:var(--sam-green);}

  .footer{margin-top:16px;padding-top:14px;border-top:1px dashed var(--sam-line);font-size:12px;color:var(--sam-ink-muted);display:flex;align-items:center;gap:6px;}
  .footer i{font-size:14px;}

  @media (max-width:480px){
    .headline{font-size:19px;}
    .card{padding:24px 18px 20px;}
    .bar{width:44px;}
    .growth span{font-size:10.5px;}
    .growth i{font-size:17px;}
    .chart{padding:0 2px;}
    .value-label{font-size:14px;}
  }
</style>
</head>
<body>

<div class="card">
  <div class="notch"></div>
  <div class="eyebrow"><i class="ti ti-chart-histogram"></i>분기별 실적 추이</div>
  <h2 class="headline">3개 분기 만에 영업이익 약 4.4배</h2>
  <p class="sub">연결 기준 영업이익 · 단위: 조원</p>

  <div class="chart">
    <div class="col-wrap">
      <div class="value-label">20.1</div>
      <div class="bar" style="height:36px;"></div>
      <div class="q-label"><b>2025 Q4</b>전년비 +208%</div>
    </div>
    <div class="col-wrap">
      <div class="growth"><i class="ti ti-arrow-big-up-lines"></i><span>+184.6%</span></div>
      <div class="value-label">57.2</div>
      <div class="bar" style="height:102px;"></div>
      <div class="q-label"><b>2026 Q1</b>전년비 +756%</div>
    </div>
    <div class="col-wrap">
      <div class="growth"><i class="ti ti-arrow-big-up-lines"></i><span>+56.2%</span></div>
      <div class="value-label">89.4</div>
      <div class="bar highlight" style="height:160px;"></div>
      <div class="q-label"><b>2026 Q2</b>전년비 +1,810%</div>
    </div>
  </div>

  <div class="note">
    <i class="ti ti-bulb"></i>
    <div>2025년 연간 영업이익(<b>43.6조원</b>)을 2026년 2분기 <b>한 분기</b> 실적만으로 이미 넘어섰습니다. 화살표 위 수치는 직전 분기 대비(QoQ) 증가율입니다.</div>
  </div>

  <div class="footer"><i class="ti ti-database"></i>출처: 삼성전자 뉴스룸 분기별 잠정·확정 실적 발표 종합</div>
</div>

</body>
</html>
