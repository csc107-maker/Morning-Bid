<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직접 PPA 상담신청 | 기업 매칭부터 계약 구조 설계까지</title>
<meta name="description" content="직접 PPA 상대기업 매칭, REC 조건 협상, 계약 구조 설계, 금융자문 연계 상담신청 안내">

<meta property="og:title" content="직접 PPA, 혼자 알아보기 어렵다면 상담신청 하세요" />
<meta property="og:description" content="기업 매칭, REC 조건 협상, 계약 구조 설계까지 직접 PPA 진입을 도와드립니다" />
<meta property="og:image" content="[여기에 썸네일 이미지 URL을 입력하세요]" />
<meta property="og:url" content="[여기에 이 카드가 게시될 페이지 URL을 입력하세요]" />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" onerror="this.remove()">
<style>
  :root{
    --bg:#F4F7FA; --surface:#FFFFFF; --ink:#101D33; --ink-soft:#52617A; --line:#DEE6ED;
    --accent-grid:#157A6E; --accent-grid-soft:#E3F2EF;
    --accent-solar:#E08E2B; --accent-solar-soft:#FBEDDB;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:'Pretendard',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:720px;margin:0 auto;padding:36px 24px 40px;}

  .card{
    position:relative;overflow:hidden;
    background:linear-gradient(135deg,#101D33,#0B3B36);
    border-radius:24px;padding:34px 30px 28px;color:#fff;
  }
  .card::before{
    content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;
    background:radial-gradient(circle,rgba(224,142,43,.35),transparent 70%);
  }
  .eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.04em;color:#F2C880;background:rgba(224,142,43,.18);padding:6px 12px;border-radius:999px;margin-bottom:16px;position:relative;z-index:1;}
  h1{font-size:24px;line-height:1.4;font-weight:800;margin:0 0 10px;letter-spacing:-0.01em;position:relative;z-index:1;}
  .sub{font-size:14px;line-height:1.65;color:#C8D3DE;margin:0 0 22px;position:relative;z-index:1;}

  .services{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;position:relative;z-index:1;}
  @media (max-width:480px){.services{grid-template-columns:1fr;}}
  .svc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 14px;font-size:13px;line-height:1.5;display:flex;gap:9px;align-items:flex-start;}
  .svc i{color:#F2C880;font-size:16px;margin-top:1px;flex-shrink:0;}

  .contact{
    background:#fff;border-radius:16px;padding:18px 20px;position:relative;z-index:1;color:var(--ink);
  }
  .contact .ctitle{font-size:13.5px;font-weight:800;margin-bottom:10px;color:var(--ink);}
  .crow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .crow:last-child{border-bottom:none;}
  .crow i{width:30px;height:30px;border-radius:8px;background:var(--accent-grid-soft);color:var(--accent-grid);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .crow .ck{color:var(--ink-soft);font-size:11.5px;min-width:64px;}
  .crow .cv{font-weight:700;}
  .placeholder{color:#B7813A;background:#FBEDDB;padding:1px 6px;border-radius:6px;font-size:12px;}

  .btnrow{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;}
  .btn{flex:1;min-width:140px;text-align:center;padding:13px 16px;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn.primary{background:var(--accent-solar);color:#1A1100;}
  .btn.ghost{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.25);}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <span class="eyebrow"><i class="ti ti-message-circle-2"></i>&nbsp;직접 PPA 상담신청</span>
    <h1>직접 PPA, 혼자 알아보기엔<br>막막하셨죠?</h1>
    <p class="sub">상대기업 매칭부터 REC 조건 협상, 계약 구조 설계, 금융 자문 연계까지 — 직접 PPA를 처음 준비하는 발전사업자분들을 돕고 있습니다.</p>

    <div class="services">
      <div class="svc"><i class="ti ti-users"></i>직접 PPA 상대기업 매칭</div>
      <div class="svc"><i class="ti ti-file-text"></i>REC·계약 조건 협상 지원</div>
      <div class="svc"><i class="ti ti-building-bank"></i>PF 금융 자문 연계</div>
      <div class="svc"><i class="ti ti-clipboard-check"></i>계약서 구조 설계 검토</div>
    </div>

    <div class="contact">
      <div class="ctitle">상담 신청 안내</div>
      <div class="crow"><i class="ti ti-building"></i><span class="ck">담당</span><span class="cv placeholder">[회사명/담당부서 입력]</span></div>
      <div class="crow"><i class="ti ti-phone"></i><span class="ck">전화</span><span class="cv placeholder">[전화번호 입력]</span></div>
      <div class="crow"><i class="ti ti-mail"></i><span class="ck">이메일</span><span class="cv placeholder">[이메일 입력]</span></div>
      <div class="crow"><i class="ti ti-brand-kakao-talk"></i><span class="ck">카카오</span><span class="cv placeholder">[카카오톡 채널/오픈채팅 링크 입력]</span></div>

      <div class="btnrow">
        <a href="#" class="btn primary"><i class="ti ti-phone-outgoing"></i>전화 상담</a>
        <a href="#" class="btn primary" style="background:#1A1100;color:#fff;"><i class="ti ti-mail"></i>이메일 문의</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
